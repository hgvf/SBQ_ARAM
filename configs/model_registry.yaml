models:
  default_reasoner:
    provider: "ollama"
    base_url: "http://localhost:11434/v1"
    model: "qwen2.5:7b"
    context_length: 8192
    temperature: 0.2
    max_tokens: 2048

  fingpt_sentiment:
    provider: "ollama"
    base_url: "http://localhost:11434/v1"
    model: "fingpt-sentiment:latest"
    context_length: 4096
    temperature: 0.0
    max_tokens: 512
    output_format: "json"

  report_writer:
    provider: "ollama"
    base_url: "http://localhost:11434/v1"
    model: "qwen2.5:7b"
    context_length: 8192
    temperature: 0.2
    max_tokens: 4096

  risk_agent:
    provider: "llama_cpp"
    base_url: "http://localhost:8080/v1"
    model: "risk-agent-q4"
    context_length: 4096
    temperature: 0.0
    max_tokens: 1024

  custom_finetuned:
    provider: "custom_api"
    base_url: "http://localhost:8300/v1"
    model: "custom-finetuned-v1"
    context_length: 8192
    temperature: 0.2
    max_tokens: 2048
