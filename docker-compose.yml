version: "3.9"
services:
  aram-api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./storage:/app/storage
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  aram-ui:
    build: .
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - ./storage:/app/storage
    command: streamlit run ui/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - aram-api
